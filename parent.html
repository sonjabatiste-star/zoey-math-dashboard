<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Parent Portal</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .locked-box {
            background: #ffe6f7;
            padding: 20px;
            border-radius: 12px;
            width: 300px;
            margin: 40px auto;
            text-align: center;
            border: 2px solid #ffb3e6;
        }

        .unlock-button {
            background: #ff99d6;
            color: white;
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
        }

        .unlock-button:hover {
            background: #e088c0;
        }

        .content {
            display: none;
            padding: 20px;
            max-width: 700px;
            margin: auto;
        }

        iframe {
            border: 1px solid #ccc;
            border-radius: 10px;
        }

        /* Editable Notes Box */
        .notes-box {
            background: #fff0fa;
            border: 2px solid #ffb3e6;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(255, 122, 196, 0.2);
            margin-top: 10px;
        }

        textarea {
            width: 100%;
            height: 150px;
            border-radius: 10px;
            border: 2px solid #ffb3e6;
            padding: 10px;
            font-size: 15px;
            resize: vertical;
            background: #fffaff;
        }

        .save-button, .clear-button {
            background: #ff99d6;
            color: white;
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
            margin-right: 10px;
        }

        .save-button:hover, .clear-button:hover {
            background: #e088c0;
        }

        /* Timestamp styling */
        #timestamp {
            margin-top: 10px;
            font-size: 14px;
            color: #555;
            font-style: italic;
        }
    </style>
</head>

<body>

<header>
    <h1>Parent Portal</h1>
    <p class="tagline">Secure access to Zoey’s tutoring plan</p>
</header>

<div class="locked-box" id="lockBox">
    <p>Enter Parent Password:</p>
    <input type="password" id="passwordInput" placeholder="1234" style="padding:8px; border-radius:8px;">
    <br>
    <button class="unlock-button" onclick="unlock()">Unlock</button>
    <p id="error" style="color:red; margin-top:10px;"></p>
</div>

<div class="content" id="parentContent">
    <h2>Zoey’s Tutoring Plan</h2>
    <p>Below is the current tutoring plan for Zoey.</p>

    <!-- PDF Embed -->
    <iframe src="tutoring-plan.pdf" width="100%" height="600px"></iframe>

    <br><br>

    <!-- Editable Notes Section -->
    <h2>Teacher Notes from Last Session</h2>
    <div class="notes-box">
        <textarea id="teacherNotes" placeholder="Type your notes here..."></textarea>
        <br>
        <button class="save-button" onclick="saveNotes()">Save Notes</button>
        <button class="clear-button" onclick="clearNotes()">Clear Notes</button>

        <!-- Timestamp -->
        <p id="timestamp"></p>
    </div>

    <br><br>

    <button onclick="window.location.href='index.html'" 
            style="padding:10px 20px; background:#7f9cff; color:white; border:none; border-radius:10px;">
        ⬅ Back to Dashboard
    </button>
</div>

<script>
function unlock() {
    const password = document.getElementById("passwordInput").value;
    const error = document.getElementById("error");

    if (password === "1234") {
        document.getElementById("lockBox").style.display = "none";
        document.getElementById("parentContent").style.display = "block";
        loadNotes(); // Load saved notes + timestamp
    } else {
        error.textContent = "Incorrect password";
    }
}

function saveNotes() {
    const notes = document.getElementById("teacherNotes").value;
    localStorage.setItem("zoeyNotes", notes);

    // Save timestamp
    const now = new Date();
    const timestamp = now.toLocaleString("en-US", {
        dateStyle: "long",
        timeStyle: "short"
    });

    localStorage.setItem("zoeyNotesTimestamp", timestamp);
    document.getElementById("timestamp").textContent = "Last updated: " + timestamp;
}

function loadNotes() {
    const saved = localStorage.getItem("zoeyNotes");
    const savedTime = localStorage.getItem("zoeyNotesTimestamp");

    if (saved) {
        document.getElementById("teacherNotes").value = saved;
    }

    if (savedTime) {
        document.getElementById("timestamp").textContent = "Last updated: " + savedTime;
    }
}

function clearNotes() {
    localStorage.removeItem("zoeyNotes");
    localStorage.removeItem("zoeyNotesTimestamp");

    document.getElementById("teacherNotes").value = "";
    document.getElementById("timestamp").textContent = "";
}
</script>

</body>
</html>
