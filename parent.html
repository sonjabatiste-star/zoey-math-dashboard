<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Parent Portal</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .locked-box {
            background: #ffe6f7;
            padding: 20px;
            border-radius: 12px;
            width: 300px;
            margin: 40px auto;
            text-align: center;
            border: 2px solid #ffb3e6;
        }

        .unlock-button {
            background: #ff99d6;
            color: white;
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
        }

        .unlock-button:hover {
            background: #e088c0;
        }

        .content {
            display: none;
            padding: 20px;
            max-width: 700px;
            margin: auto;
        }

        iframe {
            border: 1px solid #ccc;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>Parent Portal</h1>
    <p class="tagline">Secure access to Zoey’s tutoring plan</p>
</header>

<div class="locked-box" id="lockBox">
    <p>Enter Parent Password:</p>
    <input type="password" id="passwordInput" placeholder="1234" style="padding:8px; border-radius:8px;">
    <br>
    <button class="unlock-button" onclick="unlock()">Unlock</button>
    <p id="error" style="color:red; margin-top:10px;"></p>
</div>

<div class="content" id="parentContent">
    <h2>Zoey’s Tutoring Plan</h2>
    <p>Below is the current tutoring plan for Zoey.</p>

    <!-- PDF Embed -->
    <iframe src="tutoring-plan.pdf" width="100%" height="600px"></iframe>
    <br><br>

    <h2>Teacher Notes from Last Session</h2>
    <div class="notes-box">
        <p>
            <!-- Type your notes here -->
            Zoey did an excellent job today! She mastered multiplying fractions and showed strong problem‑solving skills.
        </p>
    </div>

    <br><br>
    <button onclick="window.location.href='index.html'" 
            style="padding:10px 20px; background:#7f9cff; color:white; border:none; border-radius:10px;">
        ⬅ Back to Dashboard
    </button>
</div>

<script>
function unlock() {
    const password = document.getElementById("passwordInput").value;
    const error = document.getElementById("error");

    if (password === "1234") {
        document.getElementById("lockBox").style.display = "none";
        document.getElementById("parentContent").style.display = "block";
    } else {
        error.textContent = "Incorrect password";
    }
}
</script>

</body>
</html>
